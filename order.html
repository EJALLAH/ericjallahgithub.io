<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order - Jallah & Makih Pizza Palace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">J&M Pizza</div>

        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="special.html">Special</a>
            <a href="order.html">Order</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <h1>Order Your Pizza</h1>

    <section class="order-layout">

        <div class="menu-section">

            <div class="menu-item">
                <img src="cheese.jpg">
                <h2>Cheese Pizza</h2>
                <p>$12.99</p>
                <button onclick="addToCart('Cheese Pizza',12.99)">Add</button>
            </div>

            <div class="menu-item">
                <img src="ranchpizza.jpg">
                <h2>Ranch Pizza</h2>
                <p>$15.99</p>
                <button onclick="addToCart('Ranch Pizza',15.99)">Add</button>
            </div>

            <div class="menu-item">
                <img src="buffalo.jpg">
                <h2>Buffalo Pizza</h2>
                <p>$13.99</p>
                <button onclick="addToCart('Buffalo Pizza',13.99)">Add</button>
            </div>


            <div class="menu-item">
                <img src="peppizza.jpg">
                <h2>Pepperoni Pizza</h2>
                <p>$14.99</p>
                <button onclick="addToCart('Pepperoni Pizza',14.99)">Add</button>
            </div>

            <div class="menu-item">
                <img src="veggiepizza.jpg">
                <h2>Veggie Pizza</h2>
                <p>$13.49</p>
                <button onclick="addToCart('Veggie Pizza',13.49)">Add</button>
            </div>

            <div class="menu-item">
                <img src="bbqpizza.jpg">
                <h2>BBQ Chicken Pizza</h2>
                <p>$16.99</p>
                <button onclick="addToCart('BBQ Chicken Pizza',16.99)">Add</button>
            </div>

            <div class="menu-item">
                <img src="meat.jpg">
                <h2>Meat Lovers Pizza</h2>
                <p>$17.99</p>
                <button onclick="addToCart('Meat Lovers Pizza',17.99)">Add</button>
            </div>

        </div>

        <div class="checkout">

            <h2>Your Order</h2>
            <ul id="cartItems"></ul>
            <p id="cartTotal">Total: $0.00</p>

            <h2>Delivery Info</h2>

            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="text" placeholder="Phone Number" required>
                <input type="text" placeholder="Address" required>

                <select>
                    <option>Delivery</option>
                    <option>Pickup</option>
                </select>

                <button type="submit">Place Order</button>
            </form>

        </div>

    </section>

    <footer>© 2026 J&M Pizza</footer>

    <script src="script.js"></script>

</body>
</html>
